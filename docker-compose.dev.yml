services:
  postgres:
    image: postgres:16-alpine
    container_name: shamangaro-db-dev
    environment:
      POSTGRES_USER: shamangaro
      POSTGRES_PASSWORD: shamangaro_secret
      POSTGRES_DB: shamangaro
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shamangaro -d shamangaro"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  postgres_dev_data:
